<!DOCTYPE html>
<html>

<head>
    <title>My Reports</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>My Reports</h1>

    <div class="card">

        {% if reports %}

            <ul>

            {% for report in reports %}

                <li>
                    <b>{{ report[0] }}</b>
                    <br>
                    {{ report[1] }}
                </li>

                <hr>

            {% endfor %}

            </ul>

        {% else %}

            <p>No reports found.</p>

        {% endif %}

        <br>

        <a href="/">Back to Dashboard</a>

    </div>

</div>

</body>
</html>
